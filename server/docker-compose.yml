version: '3.8'

services:
  ttyd:
    image: tsl0922/ttyd:1.7.3
    container_name: oracle-terminal
    # Keep the basic auth and tmux session persistence
    command: ttyd -c admin:oracle-root-access -p 7681 -t title="Oracle Terminal" -t fontSize=14 /bin/sh -c "chroot /host tmux new -A -s root-session"
    privileged: true
    volumes:
      - /:/host
    ports:
      # Bind EXCLUSIVELY to the Tailscale IP on port 7681
      - "100.75.79.110:7681:7681"
    restart: unless-stopped
